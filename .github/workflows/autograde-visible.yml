name: visible-autograding

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r lecture-repo/requirements.txt

      - name: Run visible autograding tests
        run: pytest -q lecture-repo/tests/

      - name: Upload student artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: student-artifacts-${{ github.sha }}
          path: |
            Lab00/
            Lab01/
            Lab02/
            Lab03/
            Lab04/
            Lab05/
            Capstone/
            Lab00Submission/
            Lab01Submission/
            Lab02Submission/
            Lab03Submission/
            Lab04Submission/
            Lab05Submission/
            CapstoneSubmission/
          retention-days: 30
