name: Deploy Course Site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'course-site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        id: configure
        uses: actions/configure-pages@v5
        with:
          enablement: true
        continue-on-error: true

      - name: Warn if Pages not yet enabled
        if: steps.configure.outcome == 'failure'
        run: |
          echo "⚠️  GitHub Pages is not yet enabled for this repository."
          echo ""
          echo "To enable it:"
          echo "  1. Go to: https://github.com/${{ github.repository }}/settings/pages"
          echo "  2. Under Source, select: GitHub Actions"
          echo "  3. Save, then re-run this workflow."
          echo ""
          echo "Skipping deployment. This is not a course content error."

      - name: Upload Pages artifact
        if: steps.configure.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: course-site

      - name: Deploy to GitHub Pages
        if: steps.configure.outcome == 'success'
        id: deployment
        uses: actions/deploy-pages@v4
